<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Injection Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css?v=20260412" />
</head>
<body>
    <div class="bg-aura" aria-hidden="true"></div>
    <main class="app-shell">
        <header class="topbar">
            <div class="title-wrap">
                <p class="eyebrow">University Thesis Demo</p>
                <h1>Prompt Injection vs Guardrail</h1>
            </div>
            <div class="status-badges">
                <span id="modeBadge" class="mode-badge">Vulnerable Mode</span>
                <span id="activeModelBadge" class="model-badge">Model: loading...</span>
            </div>
        </header>

        <section id="chatWindow" class="chat-window" aria-live="polite">
            <article class="message assistant">
                <p class="meta">assistant</p>
                <p>Welcome. Try normal prompts, then injection prompts to see model behavior.</p>
            </article>
        </section>

        <form id="chatForm" class="chat-form">
            <div class="composer-shell">
                <div class="model-row">
                    <label for="modelSelect">Model</label>
                    <select id="modelSelect" name="model" aria-label="Choose model"></select>
                    <span id="modelHint" class="model-hint">Loading models...</span>
                </div>
                <div class="input-row">
                    <label for="messageInput" class="sr-only">Enter your message</label>
                    <textarea
                        id="messageInput"
                        name="message"
                        rows="1"
                        placeholder="Message Prompt Guard demo..."
                        required
                    ></textarea>
                    <button id="sendBtn" type="submit">Send</button>
                </div>
            </div>
        </form>
    </main>

    <script src="/script.js?v=20260412"></script>
</body>
</html>
